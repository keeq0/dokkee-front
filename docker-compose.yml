services:
  frontend:
    build:
      context: .
      target: dev
    container_name: dokkee-frontend
    ports:
      - "8080:8080"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./babel.config.js:/app/babel.config.js
      - ./vue.config.js:/app/vue.config.js
      - ./jsconfig.json:/app/jsconfig.json
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - HOST=0.0.0.0
      - PORT=8080
      - VUE_APP_DEEPSEEK_KEY=${VUE_APP_DEEPSEEK_KEY:-e2e-mock-key}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  # Unit-тесты в watch-режиме (vitest сам перезапускается при изменениях).
  # Контейнер всегда запущен; смотреть логи: docker compose logs -f test-unit
  test-unit:
    build:
      context: .
      target: test
    container_name: dokkee-test-unit
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./vitest.config.js:/app/vitest.config.js
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: ["npx", "vitest"]
    restart: unless-stopped
    init: true

  # Lint в watch-режиме через chokidar-cli (eslint без нативного watch).
  # Контейнер всегда запущен; смотреть логи: docker compose logs -f test-lint
  test-lint:
    build:
      context: .
      target: test
    container_name: dokkee-test-lint
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    environment:
      - CHOKIDAR_USEPOLLING=true
      - SHELL=/bin/sh
    command: ["npm", "run", "lint:watch"]
    restart: unless-stopped
    init: true

  # E2E в watch-режиме: при изменении src/tests прогоняется playwright (1.5s debounce).
  # Зависит от healthy frontend.
  test-e2e:
    build:
      context: .
      target: e2e
    container_name: dokkee-test-e2e
    depends_on:
      frontend:
        condition: service_healthy
    volumes:
      - ./src:/e2e/src
      - ./tests/e2e:/e2e/tests/e2e
      - ./playwright.config.js:/e2e/playwright.config.js
      - ./playwright-report:/e2e/playwright-report
      - ./test-results:/e2e/test-results
      - ./package.json:/e2e/package.json
    environment:
      - BASE_URL=http://frontend:8080
      - CI=1
      - CHOKIDAR_USEPOLLING=true
      - SHELL=/bin/bash
    command: ["npm", "run", "test:e2e:watch"]
    restart: unless-stopped
    init: true

  # Профильный build-check для CI/ручной проверки сборки.
  build-check:
    build:
      context: .
      target: test
    profiles: ["build"]
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./babel.config.js:/app/babel.config.js
      - ./vue.config.js:/app/vue.config.js
      - ./jsconfig.json:/app/jsconfig.json
    command: ["npm", "run", "build"]
