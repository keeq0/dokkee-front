services:
  frontend:
    build:
      context: .
      target: dev
    container_name: dokkee-frontend
    ports:
      - "8085:8080"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./babel.config.js:/app/babel.config.js
      - ./vue.config.js:/app/vue.config.js
      - ./jsconfig.json:/app/jsconfig.json
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - HOST=0.0.0.0
      - PORT=8080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  test-unit:
    build:
      context: .
      target: test
    profiles: ["test"]
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./vitest.config.js:/app/vitest.config.js
    command: ["npm", "run", "test:unit"]

  test-e2e:
    build:
      context: .
      target: e2e
    profiles: ["test"]
    depends_on:
      frontend:
        condition: service_healthy
    volumes:
      # При локальной разработке тестов изменения подхватываются без ребилда.
      - ./tests/e2e:/e2e/tests/e2e
      - ./playwright.config.js:/e2e/playwright.config.js
      # Артефакты пишутся на хост.
      - ./playwright-report:/e2e/playwright-report
      - ./test-results:/e2e/test-results
    environment:
      - BASE_URL=http://frontend:8080
      - CI=1

  test-lint:
    build:
      context: .
      target: test
    profiles: ["test"]
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    command: ["npm", "run", "lint"]
