name: CI/CD

on:
  push:
    branches: [ main, develop, staging ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group                : ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress   : ${{ github.event_name == 'pull_request' }}

permissions:
  contents             : read

jobs:

  # ------------------------------------------------------------
  paths:
    name               : Detect changes
    runs-on            : ubuntu-latest
    permissions:
      pull-requests    : read
      contents         : read
    outputs:
      frontend         : ${{ steps.filter.outputs.frontend }}
      workflows        : ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id   : filter
        with :
          filters: |
            frontend:
              - 'src/**'
              - 'public/**'
              - 'tests/**'
              - 'package.json'
              - 'package-lock.json'
              - 'Dockerfile'
              - 'docker-compose.yml'
              - 'vue.config.js'
              - 'vitest.config.js'
              - 'playwright.config.js'
              - 'babel.config.js'
              - 'jsconfig.json'
            workflows:
              - '.github/**'

  # ------------------------------------------------------------
  lint:
    name               : Lint code (ESLint)
    runs-on            : ubuntu-latest
    needs              : paths
    if                 : needs.paths.outputs.frontend == 'true' || needs.paths.outputs.workflows == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          cache-from    : type=gha
          cache-to      : type=gha,mode=max
      - run : docker compose run --rm test-lint npm run lint

  # ------------------------------------------------------------
  unit:
    name               : Unit tests (Vitest)
    runs-on            : ubuntu-latest
    needs              : [ paths, lint ]
    if                 : needs.paths.outputs.frontend == 'true' || needs.paths.outputs.workflows == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          cache-from    : type=gha
          cache-to      : type=gha,mode=max
      - run : docker compose run --rm test-unit npm run test:unit

  # ------------------------------------------------------------
  frontend-build:
    name               : Check npm build
    runs-on            : ubuntu-latest
    needs              : [ paths, lint, unit ]
    if                 : needs.paths.outputs.frontend == 'true' || needs.paths.outputs.workflows == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version   : 20
          cache          : 'npm'
      - name: Install dependencies
        run : npm ci
      - name: Build project
        run : npm run build

  # ------------------------------------------------------------
  e2e:
    name               : E2E tests (Playwright)
    runs-on            : ubuntu-latest
    needs              : [ paths, frontend-build ]
    if                 : needs.paths.outputs.frontend == 'true' || needs.paths.outputs.workflows == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          cache-from    : type=gha
          cache-to      : type=gha,mode=max
      - name: Start frontend
        run : docker compose up -d frontend
      - name: Wait for frontend healthy
        run : |
          while [[ "$(docker inspect --format='{{.State.Health.Status}}' dokkee-frontend)" != "healthy" ]]; do
            echo "Waiting for frontend..."
            sleep 2
          done
      - name: Run e2e tests
        run : docker compose run --rm test-e2e npx playwright test
      - name: Upload Playwright report
        if   : always()
        uses: actions/upload-artifact@v4
        with:
          name           : playwright-report
          path           : |
            playwright-report/
            test-results/
          retention-days : 7
      - name: Stop frontend
        if   : always()
        run : docker compose down

  # ------------------------------------------------------------
  docker-build:
    name               : Docker build (all stages)
    runs-on            : ubuntu-latest
    needs              : [ paths, frontend-build ]
    if                 : needs.paths.outputs.frontend == 'true' || needs.paths.outputs.workflows == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          cache-from    : type=gha
          cache-to      : type=gha,mode=max
      - name: Build deps stage
        run : docker build --target deps --tag dokkee-deps:ci .
      - name: Build dev stage
        run : docker build --target dev --tag dokkee-dev:ci .
      - name: Build test stage
        run : docker build --target test --tag dokkee-test:ci .
      - name: Build e2e stage
        run : docker build --target e2e --tag dokkee-e2e:ci .
      - name: Verify non-root user in final images
        run : |
          docker run --rm dokkee-test:ci id
          docker run --rm dokkee-e2e:ci id

  # ------------------------------------------------------------
  deploy-staging:
    name               : Deploy to GitHub Pages
    runs-on            : ubuntu-latest
    if                 : |
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.paths.outputs.frontend == 'true' &&
      needs.docker-build.result == 'success' &&
      needs.e2e.result == 'success'
    needs              : [ paths, docker-build, e2e ]
    environment        : github-pages
    permissions:
      contents         : read
      pages            : write
      id-token         : write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version  : 20
          cache         : 'npm'
      - name: Install dependencies
        run : npm ci
      - name: Build project
        run : npm run build
      - name: Create 404 fallback (SPA)
        run : cp dist/index.html dist/404.html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path          : dist/
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  # ------------------------------------------------------------
  ci-summary:
    name               : CI Summary
    runs-on            : ubuntu-latest
    needs              :
      - paths
      - lint
      - unit
      - frontend-build
      - e2e
      - docker-build
      - deploy-staging
    if                 : always()
    steps:
      - name: Check job results
        run : |
          failed=false
          for job in "lint" "unit" "frontend-build" "e2e" "docker-build" "deploy-staging"; do
            result=$(echo '${{ toJson(needs) }}' | jq -r ".[\"$job\"].result")
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "[FAIL] Job $job failed or cancelled"
              failed=true
            elif [ "$result" = "success" ]; then
              echo "[OK] Job $job succeeded"
            else
              echo "[SKIP] Job $job skipped or waiting"
            fi
          done
          if [ "$failed" = "true" ]; then
            exit 1
          fi
          echo "All required jobs succeeded or were skipped."