name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Lint code (ESLint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run linter via docker compose
        run: |
          docker compose --profile test run --rm test-lint
  unit:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run unit tests via docker compose
        run: |
          docker compose --profile test run --rm test-unit
  build:
    name: Check production build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run build check via docker compose
        run: |
          docker compose --profile test run --rm build-check
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start frontend container
        run: |
          docker compose up -d frontend

      - name: Wait for frontend to be healthy
        run: |
          while [[ "$(docker inspect --format='{{.State.Health.Status}}' dokkee-frontend)" != "healthy" ]]; do
            echo "Waiting for frontend to be healthy..."
            sleep 2
          done

      - name: Run e2e tests
        run: |
          docker compose --profile test run --rm test-e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Stop frontend container
        if: always()
        run: docker compose down