name: CI/CD

on:
  push:
    branches: [ main, develop, staging ]   # добавили staging
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Lint code (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - run: docker compose --profile test run --rm test-lint

  unit:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - run: docker compose --profile test run --rm test-unit

  build:
    name: Check production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - run: docker compose --profile test run --rm build-check

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Start frontend
        run: docker compose up -d frontend
      - name: Wait for frontend healthy
        run: |
          while [[ "$(docker inspect --format='{{.State.Health.Status}}' dokkee-frontend)" != "healthy" ]]; do
            echo "Waiting for frontend..."
            sleep 2
          done
      - name: Run e2e tests
        run: docker compose --profile test run --rm test-e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
      - name: Stop frontend
        if: always()
        run: docker compose down

  deploy-staging:
    name: Deploy to GitHub Pages (staging)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [lint, unit, build, e2e]
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build project
        run: npm run build
      - name: Create 404 fallback (SPA)
        run: cp dist/index.html dist/404.html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4