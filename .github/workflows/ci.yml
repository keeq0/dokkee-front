name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Lint code (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - run: docker compose --profile test run --rm test-lint

  unit:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - run: docker compose --profile test run --rm test-unit

  build:
    name: Check production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - run: docker compose --profile test run --rm build-check

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Start frontend
        run: docker compose up -d frontend
      - name: Wait for frontend healthy
        run: |
          while [[ "$(docker inspect --format='{{.State.Health.Status}}' dokkee-frontend)" != "healthy" ]]; do
            echo "Waiting..."
            sleep 2
          done
      - name: Run e2e
        run: docker compose --profile test run --rm test-e2e
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
      - name: Stop frontend
        if: always()
        run: docker compose down